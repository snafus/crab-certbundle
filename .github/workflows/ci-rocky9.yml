name: CI — Rocky Linux 9 (Python 3.9 + latest)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rocky 9 / Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "system"        # Python 3.9 shipped with Rocky 9
            install_python: false
          - python: "latest"        # Latest CPython via deadsnakes / source
            install_python: true

    steps:
      - name: Install system dependencies
        run: |
          dnf -y install \
            python3 \
            python3-pip \
            python3-devel \
            openssl \
            ca-certificates \
            gcc \
            make \
            tar \
            gzip \
            git
          dnf clean all

      - name: Install latest Python (python3.12 from EPEL/CRB)
        if: matrix.install_python == true
        run: |
          dnf -y install epel-release
          dnf config-manager --set-enabled crb
          dnf -y install python3.12 python3.12-pip python3.12-devel
          dnf clean all

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Python interpreter
        id: pybin
        run: |
          if [ "${{ matrix.install_python }}" = "true" ]; then
            echo "python=python3.12" >> "$GITHUB_OUTPUT"
            echo "pip=python3.12 -m pip" >> "$GITHUB_OUTPUT"
          else
            echo "python=python3" >> "$GITHUB_OUTPUT"
            echo "pip=python3 -m pip" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade pip
        run: ${{ steps.pybin.outputs.pip }} install --upgrade pip

      - name: Install package + test deps
        run: |
          ${{ steps.pybin.outputs.pip }} install \
            "cryptography>=2.8" \
            "PyYAML>=5.1" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=7.0" \
            "pytest-cov>=4.0"
          ${{ steps.pybin.outputs.pip }} install -e .

      - name: Show environment
        run: |
          ${{ steps.pybin.outputs.python }} --version
          openssl version
          ${{ steps.pybin.outputs.pip }} list

      - name: Run tests
        run: |
          ${{ steps.pybin.outputs.python }} -m pytest tests/ -v --tb=short \
            --cov=certbundle --cov-report=term-missing
