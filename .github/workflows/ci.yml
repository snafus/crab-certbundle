name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches: [main]

jobs:
  # ── Rocky Linux 8 — Python 3.6.8 (EL8 system Python) ──────────────────────
  rocky8:
    name: Rocky 8 / Python 3.6.8
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install system dependencies
        run: |
          dnf -y install \
            python3 python3-pip python3-devel \
            openssl ca-certificates gcc make tar gzip git
          dnf clean all

      - name: Upgrade pip (EL8 ships an old pip)
        run: python3 -m pip install --upgrade "pip<21.4"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install package + test deps
        run: |
          python3 -m pip install \
            "cryptography>=2.8,<4.0" \
            "PyYAML>=5.1,<6.0" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=6.0,<7.0" \
            "pytest-cov>=2.0"
          python3 -m pip install -e .

      - name: Show environment
        run: |
          python3 --version
          openssl version
          python3 -m pip list

      - name: Run unit tests
        run: |
          python3 -m pytest tests/ --ignore=tests/integration -v --tb=short \
            --cov=crab --cov-report=term-missing

      - name: Run integration tests
        run: |
          python3 -m pytest tests/integration/ -v --tb=short

  # ── Rocky Linux 9 — system Python 3.9 + latest (3.12) ────────────────────
  rocky9:
    name: Rocky 9 / Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.9"      # system Python shipped with Rocky 9
            install_python: false
          - python: "3.12"     # latest via EPEL/CRB
            install_python: true

    steps:
      - name: Install system dependencies
        run: |
          dnf -y install \
            python3 python3-pip python3-devel \
            openssl ca-certificates gcc make tar gzip git
          dnf clean all

      - name: Install Python 3.12 (EPEL/CRB)
        if: matrix.install_python == true
        run: |
          dnf -y install epel-release
          dnf config-manager --set-enabled crb
          dnf -y install python3.12 python3.12-pip python3.12-devel
          dnf clean all

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Python interpreter
        id: py
        run: |
          if [ "${{ matrix.install_python }}" = "true" ]; then
            echo "bin=python3.12" >> "$GITHUB_OUTPUT"
            echo "pip=python3.12 -m pip" >> "$GITHUB_OUTPUT"
          else
            echo "bin=python3" >> "$GITHUB_OUTPUT"
            echo "pip=python3 -m pip" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade pip
        run: ${{ steps.py.outputs.pip }} install --upgrade pip

      - name: Install package + test deps
        run: |
          ${{ steps.py.outputs.pip }} install \
            "cryptography>=2.8" \
            "PyYAML>=5.1" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=7.0" \
            "pytest-cov>=4.0"
          ${{ steps.py.outputs.pip }} install -e .

      - name: Show environment
        run: |
          ${{ steps.py.outputs.bin }} --version
          openssl version
          ${{ steps.py.outputs.pip }} list

      - name: Run unit tests
        run: |
          ${{ steps.py.outputs.bin }} -m pytest tests/ --ignore=tests/integration -v --tb=short \
            --cov=crab --cov-report=term-missing

      - name: Run integration tests
        run: |
          ${{ steps.py.outputs.bin }} -m pytest tests/integration/ -v --tb=short

  # ── Ubuntu 22.04 — Python 3.10 ───────────────────────────────────────────
  ubuntu-2204:
    name: Ubuntu 22.04 / Python 3.10
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q python3 python3-pip openssl

      - name: Install package + test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            "cryptography>=2.8" \
            "PyYAML>=5.1" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=7.0" \
            "pytest-cov>=4.0"
          python3 -m pip install -e .

      - name: Show environment
        run: |
          python3 --version
          openssl version
          python3 -m pip list

      - name: Run unit tests
        run: |
          python3 -m pytest tests/ --ignore=tests/integration -v --tb=short \
            --cov=crab --cov-report=term-missing

      - name: Run integration tests
        run: python3 -m pytest tests/integration/ -v --tb=short

  # ── Ubuntu 24.04 — Python 3.12 ───────────────────────────────────────────
  ubuntu-2404:
    name: Ubuntu 24.04 / Python 3.12
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q python3 python3-pip openssl

      - name: Install package + test deps
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install \
            "cryptography>=2.8" \
            "PyYAML>=5.1" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=7.0" \
            "pytest-cov>=4.0" \
            --break-system-packages
          python3 -m pip install -e . --break-system-packages

      - name: Show environment
        run: |
          python3 --version
          openssl version
          python3 -m pip list

      - name: Run unit tests
        run: |
          python3 -m pytest tests/ --ignore=tests/integration -v --tb=short \
            --cov=crab --cov-report=term-missing

      - name: Run integration tests
        run: python3 -m pytest tests/integration/ -v --tb=short

  # ── Docker build validation (no push) ────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image — amd64 only, no push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false

  # ── RPM builds (run after tests pass) ────────────────────────────────────
  rpm-el8:
    name: RPM / EL8
    needs: [rocky8]
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install build dependencies
        run: |
          dnf -y install \
            python3 python3-pip \
            gcc openssl-devel libffi-devel make \
            rpm-build systemd-rpm-macros git
          dnf clean all
          python3 -m pip install --upgrade "pip<21.4"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare rpmbuild tree and source tarball
        run: |
          git config --global --add safe.directory '*'
          VERSION=$(python3 -c "import configparser; c=configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          git archive --prefix=crab-certbundle-${VERSION}/ HEAD \
            | gzip > rpmbuild/SOURCES/crab-certbundle-${VERSION}.tar.gz
          cp packaging/rpm/crab-certbundle.spec rpmbuild/SPECS/

      - name: Build RPM
        run: |
          rpmbuild -ba rpmbuild/SPECS/crab-certbundle.spec \
            --define "_topdir $(pwd)/rpmbuild"

      - name: Locate built RPMs
        run: find rpmbuild/RPMS rpmbuild/SRPMS -name "*.rpm" | sort

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el8
          path: |
            rpmbuild/RPMS/**/*.rpm
            rpmbuild/SRPMS/**/*.rpm
          retention-days: 30

  rpm-el9:
    name: RPM / EL9
    needs: [rocky9]
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Install build dependencies
        run: |
          dnf -y install \
            python3 python3-pip \
            gcc openssl-devel libffi-devel make \
            rpm-build systemd-rpm-macros git
          dnf clean all
          python3 -m pip install --upgrade pip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare rpmbuild tree and source tarball
        run: |
          git config --global --add safe.directory '*'
          VERSION=$(python3 -c "import configparser; c=configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          git archive --prefix=crab-certbundle-${VERSION}/ HEAD \
            | gzip > rpmbuild/SOURCES/crab-certbundle-${VERSION}.tar.gz
          cp packaging/rpm/crab-certbundle.spec rpmbuild/SPECS/

      - name: Build RPM
        run: |
          rpmbuild -ba rpmbuild/SPECS/crab-certbundle.spec \
            --define "_topdir $(pwd)/rpmbuild"

      - name: Locate built RPMs
        run: find rpmbuild/RPMS rpmbuild/SRPMS -name "*.rpm" | sort

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el9
          path: |
            rpmbuild/RPMS/**/*.rpm
            rpmbuild/SRPMS/**/*.rpm
          retention-days: 30

  # ── Debian .deb build (run after Ubuntu tests pass) ──────────────────────
  deb:
    name: DEB / Ubuntu 22.04
    needs: [ubuntu-2204]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            dpkg-dev debhelper python3-pip gcc libssl-dev libffi-dev git

      - name: Build .deb
        run: |
          git config --global --add safe.directory '*'
          bash packaging/deb/build-deb.sh

      - name: Verify .deb metadata
        run: |
          dpkg -I debbuild/crab-certbundle_*.deb
          dpkg --contents debbuild/crab-certbundle_*.deb | grep usr/bin/crabctl
          dpkg --contents debbuild/crab-certbundle_*.deb | grep lib/systemd

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu2204
          path: debbuild/crab-certbundle_*.deb
          retention-days: 30
