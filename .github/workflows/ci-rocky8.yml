name: CI — Rocky Linux 8 (Python 3.6)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rocky 8 / Python 3.6.8
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - name: Install system dependencies
        run: |
          dnf -y install \
            python3 \
            python3-pip \
            python3-devel \
            openssl \
            ca-certificates \
            gcc \
            make \
            tar \
            gzip \
            git
          dnf clean all

      - name: Upgrade pip (EL8 ships an old pip)
        run: python3 -m pip install --upgrade "pip<21.4"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install package + test deps
        run: |
          python3 -m pip install \
            "cryptography>=2.8,<4.0" \
            "PyYAML>=5.1,<6.0" \
            "click>=7.0" \
            "requests>=2.20" \
            "pytest>=6.0,<7.0" \
            "pytest-cov>=2.0"
          python3 -m pip install -e .

      - name: Show environment
        run: |
          python3 --version
          openssl version
          python3 -m pip list

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v --tb=short \
            --cov=certbundle --cov-report=term-missing
