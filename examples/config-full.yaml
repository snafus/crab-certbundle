##
## certbundle — full annotated configuration reference
## Copy this file and remove/edit sections you don't need.
##

version: 1

# ---------------------------------------------------------------------------
# Sources — where to load CA certificates from
# ---------------------------------------------------------------------------
sources:

  # IGTF trust anchors from a local directory (typical on an existing grid node)
  igtf-classic-dir:
    type: igtf
    path: /etc/grid-security/certificates
    # Restrict to specific IGTF policy distributions.
    # Values: classic, iota, mics, slcs.  Omit to accept all.
    policies:
      - classic
      - iota

  # IGTF trust anchors from a downloaded tarball
  igtf-classic-tarball:
    type: igtf
    tarball: /var/cache/certbundle/igtf-preinstalled-bundle-classic-1.120.tar.gz
    policies:
      - classic

  # IGTF bundle fetched directly from dl.igtf.net over HTTPS
  # Note: the URL must point to a .tar.gz file.
  # String values support ${VAR} and ${VAR:-default} environment variable
  # interpolation, making container deployments easier:
  #   cache_dir: "${CACHE_DIR:-/var/cache/certbundle}"
  igtf-online:
    type: igtf
    url: "https://dl.igtf.net/distribution/igtf/current/accredited/igtf-preinstalled-bundle-classic-1.120.tar.gz"
    cache_dir: "${CERTBUNDLE_CACHE_DIR:-/var/cache/certbundle}"

  # Public CA roots from the OS trust store — auto-detected across EL,
  # Debian/Ubuntu, Alpine, macOS, and other common platforms.
  # Override with an explicit path if your bundle is in a non-standard location:
  #   path: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
  system-roots:
    type: system

  # Public CA roots from a directory of PEM files
  custom-public-roots:
    type: local
    path: /etc/crab/extra-roots/
    pattern:
      - "*.pem"
      - "*.crt"
    recursive: false


# ---------------------------------------------------------------------------
# Output profiles — one profile = one output directory
# ---------------------------------------------------------------------------
profiles:

  # Classic IGTF-only trust directory for grid software (XRootD, dCache, gfal2, …)
  grid:
    description: "IGTF classic + IOTA trust anchors for grid data transfer"
    sources:
      - igtf-classic-dir
    output_path: /etc/grid-security/certificates
    staging_path: /var/lib/certbundle/staging/grid

    # Write atomically: stage in a temp directory, then rename into place.
    atomic: true

    # rehash: "auto"    → try openssl rehash, then c_rehash, then builtin
    #         "openssl" → require openssl rehash (fail if unavailable)
    #         "builtin" → pure Python hash computation only
    rehash: auto

    # Copy IGTF .info / .signing_policy / .namespaces files to the output directory.
    include_igtf_meta: true

    # Fetch and store CRLs alongside the certificates.
    include_crls: true

    # Policy applied to all certificates from all sources before writing.
    policy:
      reject_expired: true
      reject_not_yet_valid: false
      require_ca_flag: true

      # Explicit include rules — if present, a cert must match at least one.
      # (No include rules = accept everything that passes structural checks.)
      # include:
      #   - igtf_policy: classic
      #   - igtf_policy: iota

      # Explicit exclude rules — matching certificates are dropped.
      # exclude:
      #   - fingerprint_sha256: "AA:BB:CC:..."
      #   - subject_regex: "CN=Some Deprecated CA.*"

    # CRL settings (only active when include_crls: true)
    crl:
      fetch: true
      # Write CRLs to the same directory as the certificates.
      crl_path: /etc/grid-security/certificates
      max_age_hours: 24
      verify_tls: true
      timeout_seconds: 30
      # Where to look for CRL URLs: 'distribution' = CDP extension, 'igtf' = .info file
      sources:
        - distribution
        - igtf

    file_mode: "0o644"
    dir_mode: "0o755"


  # Server-auth only: public CAs for validating server TLS certificates
  server-auth:
    description: "Public CA roots for server certificate validation"
    sources:
      - system-roots
      - custom-public-roots
    output_path: /etc/crab/server-auth
    staging_path: /var/lib/certbundle/staging/server-auth
    atomic: true
    rehash: auto
    include_igtf_meta: false
    include_crls: false

    policy:
      reject_expired: true
      require_ca_flag: true
      # Only trust CAs that have serverAuth in their EKU.
      # Omit this if you want all CAs regardless of EKU.
      # server_auth_only: true
      exclude:
        # Example: remove a specific CA by fingerprint
        # - fingerprint_sha256: "AA:BB:CC:DD:..."
        # Example: remove CAs matching a subject pattern
        # - subject_regex: "CN=DST Root CA X3"
        []

    file_mode: "0o644"
    dir_mode: "0o755"


  # Combined: IGTF + public CAs in one directory (for software that needs both)
  combined:
    description: "Combined IGTF + public CA bundle"
    sources:
      - igtf-classic-dir
      - system-roots
    output_path: /etc/crab/combined
    staging_path: /var/lib/certbundle/staging/combined
    atomic: true
    rehash: auto
    include_igtf_meta: true
    include_crls: false

    policy:
      reject_expired: true
      require_ca_flag: true


  # PKCS#12 bundle: all trust anchors in a single .p12 file (for Java, browsers, …)
  # output_path must be a file path (not a directory).
  # pkcs12_password: leave empty for no encryption, or supply a passphrase.
  #   Use ${VAR} to inject the secret from the environment in container deployments:
  #   pkcs12_password: "${PKCS12_PASSPHRASE}"
  trust-bundle-p12:
    description: "All trust anchors as an encrypted PKCS#12 file"
    sources:
      - igtf-classic-dir
      - system-roots
    output_format: pkcs12
    output_path: /etc/crab/trust-bundle.p12
    pkcs12_password: "${PKCS12_PASSPHRASE:-}"

    policy:
      reject_expired: true
      require_ca_flag: true


# ---------------------------------------------------------------------------
# Refresh / scheduling hints (informational — not executed by certbundle itself)
# Used by the included systemd timer / cron examples.
# ---------------------------------------------------------------------------
refresh:
  # Cron expression for scheduled refresh (informational; see systemd/cron examples)
  schedule: "0 4 * * *"
  # Maximum time in seconds for a full refresh run before it is considered stuck
  timeout: 300


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: INFO   # DEBUG, INFO, WARNING, ERROR
  # Uncomment to write logs to a file in addition to stderr:
  # file: /var/log/certbundle.log
