[tox]
envlist = py36, py37, py38, py39, py310, py311
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=6.0
    pytest-cov>=2.0
    cryptography>=2.8
    PyYAML>=5.1
    click>=7.0
    requests>=2.20
commands =
    pytest {posargs} --cov=certbundle --cov-report=term-missing

[testenv:py36]
deps =
    {[testenv]deps}
    # cryptography 3.x is the latest version supporting Python 3.6
    cryptography>=2.8,<4.0
    PyYAML>=5.1,<6.0
